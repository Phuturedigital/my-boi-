<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>voice</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="status" class="status" aria-live="polite"></div>
  <div id="caption" class="caption" aria-live="polite"></div>
  <div id="hint" class="hint">Headphones recommended · Tap orb, then say "my boi"</div>

  <button id="mic" class="mic" aria-label="Toggle microphone" aria-pressed="true">
    <svg class="mic-icon on" viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="3" width="6" height="12" rx="3"/>
      <path d="M5 11a7 7 0 0 0 14 0"/>
      <line x1="12" y1="18" x2="12" y2="22"/>
    </svg>
    <svg class="mic-icon off" viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="3" x2="21" y2="21"/>
      <path d="M9 9v2a3 3 0 0 0 5.12 2.12"/>
      <path d="M15 9.34V6a3 3 0 0 0-5.94-.6"/>
      <path d="M17 16.95A7 7 0 0 1 5 11"/>
      <line x1="12" y1="18" x2="12" y2="22"/>
    </svg>
  </button>

  <script src="app.js"></script>
</body>
</html>
