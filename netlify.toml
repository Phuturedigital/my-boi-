# Netlify deployment config for my boi.
# After connecting the repo, set these env vars in Site settings → Environment:
#   SUPABASE_URL
#   SUPABASE_ANON_KEY

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# POST /api/ask → the serverless function (rewrite keeps method + body).
[[redirects]]
  from = "/api/ask"
  to = "/.netlify/functions/ask"
  status = 200
  force = true

# SPA fallback: everything else serves the built index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
